name: Fetch Claude Blog Articles

on:
  schedule:
    # 每天早上 9:00 UTC+8（= 01:00 UTC）
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

# 防止 cron 與手動觸發同時執行造成 push race
concurrency:
  group: fetch-blog
  cancel-in-progress: false

jobs:
  fetch-and-archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout blog-archive branch
        uses: actions/checkout@v4
        with:
          ref: blog-archive
          fetch-depth: 1

      - name: Lint shell scripts
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck scripts/fetch-blog.sh || echo "::warning::shellcheck found issues in fetch-blog.sh"
          shellcheck scripts/fetch-tips.sh || echo "::warning::shellcheck found issues in fetch-tips.sh"
          shellcheck scripts/fetch-community-sources.sh || echo "::warning::shellcheck found issues in fetch-community-sources.sh"

      - name: Fetch blog articles (with retry)
        id: fetch
        run: |
          # 網路不穩時最多重試 3 次，間隔 10s / 20s / 40s
          for attempt in 1 2 3; do
            if bash scripts/fetch-blog.sh 2>&1 | tee /tmp/fetch.log; then
              echo "Fetch succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 10 * 2))
              echo "Retry attempt $((attempt + 1))..."
            else
              echo "::error::All 3 fetch attempts failed"
              exit 1
            fi
          done

          # 取得本次新增皇數（從 fetch-blog.sh 最後一行輸出解析）
          NEW_COUNT=$(tail -1 /tmp/fetch.log | grep -oP 'New:\s*\K[0-9]+' || echo "0")
          echo "new_count=${NEW_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Fetch tips (shanraisshan/claude-code-best-practice + X/Twitter via repo)
        id: fetch_tips
        run: |
          for attempt in 1 2 3; do
            if bash scripts/fetch-tips.sh 2>&1 | tee /tmp/fetch-tips.log; then
              echo "Tips fetch succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 10 * 2))
              echo "Retry attempt $((attempt + 1))..."
            else
              echo "::warning::All 3 tips fetch attempts failed"
            fi
          done
          TIPS_NEW=$(tail -5 /tmp/fetch-tips.log | grep -oP 'New:\s*\K[0-9]+' || echo "0")
          echo "tips_new=${TIPS_NEW}" >> "$GITHUB_OUTPUT"

      - name: Fetch community sources (howborisusesclaudecode, thariq.io, docs, GitHub)
        id: fetch_community
        run: |
          for attempt in 1 2 3; do
            if bash scripts/fetch-community-sources.sh 2>&1 | tee /tmp/fetch-community.log; then
              echo "Community fetch succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 10 * 2))
              echo "Retry attempt $((attempt + 1))..."
            else
              echo "::warning::All 3 community fetch attempts failed"
            fi
          done
          COMMUNITY_NEW=$(tail -5 /tmp/fetch-community.log | grep -oP 'New:\s*\K[0-9]+' || echo "0")
          echo "community_new=${COMMUNITY_NEW}" >> "$GITHUB_OUTPUT"

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        env:
          NEW_COUNT: ${{ steps.fetch.outputs.new_count }}
          TIPS_NEW: ${{ steps.fetch_tips.outputs.tips_new }}
          COMMUNITY_NEW: ${{ steps.fetch_community.outputs.community_new }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "archive: sync blog (+${NEW_COUNT}) tips (+${TIPS_NEW}) community (+${COMMUNITY_NEW}) — $(date '+%Y-%m-%d')" \
                     -m "Run: ${RUN_URL}"
          git push origin blog-archive
